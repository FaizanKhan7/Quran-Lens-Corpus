version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quran_lens_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: quran
      POSTGRES_PASSWORD: quran_dev
      POSTGRES_DB: quran_lens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quran -d quran_lens"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quran_lens_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quran-lens.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
